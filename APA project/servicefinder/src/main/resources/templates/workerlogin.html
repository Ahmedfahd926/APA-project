<!doctype html>
<html>
  <head>
    <title>Service Finder</title>
    <link rel="stylesheet" href="/signup.css" />
  </head>
  <body>
    <center>
      <img src="/login image.png" height="50%" width="50%" />
      <br />
      <a href="/"><button>Client</button></a>
      <button id="Selected">Worker</button>
      <form method="post" action="/worker/login">
        <br />
        <div th:if="${errorMessage}" 
     style="color: whitesmoke; background-color: red; border: 1px solid #c3e6cb; padding: 10px; margin-bottom: 10px; border-radius: 10px;">
    <span th:text="${errorMessage}"></span>
      </div>

        username:
        <input class="usernameinput"
          type="text"
          name="workerUsername"
          size="40"
          width="500"
          required
        />
        <br />
        password:
        <input class="passwordinput"
          type="password"
          name="workerPassword"
          size="40"
          width="500"
          required
        />
        <br />
        <input type="submit" value="login" /> <input type="reset" />
        <br>
      </form>
    </center>
  </body>
</html>
