<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Service Finder</title>
    <link rel="stylesheet" href="/WorkerHomePage.css">
    <style>
     
    </style>
  </head>
  <body>
    <header>
      <nav>
        <div><p>Service Finder</p></div>
         <ul>
                <li><a th:href="@{/WorkerHome}">Requests</a></li>
                <li><a th:href="@{/TotalEarnings}">Total Earnings</a></li>
                <li><a th:href="@{/}">Sign Out</a></li>
            </ul>
      </nav>
    </header>
                    <center>
    <div class="content-container">
      <h2>Welcome, <span th:text="${worker.workerUsername}"></span></h2>
      <p>Available jobs for <strong th:text="${worker.profession}"></strong>s:</p>
      <hr>
              

      <div th:each="job : ${jobs}" class="job-card">
    <div>
        <h3 th:text="${job.client != null ? job.client.clientName : 'Unknown Client'}">Client Name</h3>
        <p style="color: #28a745; font-weight: bold; margin-bottom: 5px;">
            Phone: <span th:text="${job.client != null ? job.client.clientNumber : 'N/A'}"></span>
        </p>
        
        <b th:text="${job.governate} + ' - ' + ${job.city}"></b><br>
        <span th:text="${job.address}"></span>
    </div>
    
    <form th:action="@{/worker/complete-job/{id}(id=${job.id})}" method="post">
        <button type="submit" class="btn-accept">Mark as Done</button>
    </form>
</div>

      <div th:if="${#lists.isEmpty(jobs)}" class="no-jobs">
          <p>No requests found in your field at the moment.</p>
      </div>
    </div>

  </body>
</html>
