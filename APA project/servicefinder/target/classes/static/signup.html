<!doctype html>
<html>
  <head>
    <title>Service Finder</title>
  </head>
  <body>
    <center>
      <form method="post" action="/signup">
        <img src="Signup Image.png" height="50%" width="50%" />
        <br />
        name:
        <input type="text" name="name" placeholder="Enter your name" required />
        <br />
        number:
        <input
          type="tel"
          name="number"
          placeholder="Enter your number"
          required
        />
        <br />
        email:
        <input
          type="email"
          name="email"
          placeholder="Enter your email"
          required
        />
        <br />
        username:
        <input
          type="text"
          name="Clientusername"
          placeholder="username you want to use"
          required
        />
        <br />
        password: <input type="password" name="Clientpassword" required />
        <br />
        confirm password: <input type="password" name="password" />
        <br />
        <input type="submit" value="sign up" /> <input type="reset" />
      </form>
    </center>
  </body>
</html>
