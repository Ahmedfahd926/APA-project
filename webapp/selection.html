<!DOCTYPE html>
<html>
    <head>
<title>Service Finder</title>
    </head>
    <body style="background-color: rgb(226, 215, 197);">
        
        
                    <center>
                        <img src="selection image.png" height="50%" width="50%">
                        <form>
    governate:<input type="text" list="governate" placeholder="Name of your governate" name="governate" required size="40" width="500">

        <option>Cairo</option>
        <option>Giza</option>
        <option>Alexandria</option>
        <option>Sharkya</option>
        <option>Asuit</option>
        <option>Hurghada</option>
    </datalist>
    <br>
    Type of service <select name="service" required  width="500">
    <option name="Plumber">Plumber</option>
    <option name="Carpenter">Carpenter</option>
    <option name="Mechanic">Mechanic</option>
</select>
<br>
please upload a picture of the problem <input type="file" required size="40" width="500">
<br>
<input type="submit"> <input type="reset">
                        </form>
                    </center>
    </body>
</html>
